# version: "3.8"

services:  
  # PostgreSQL database
  postgres:
    container_name: postgres
    image: postgres:latest
    restart: always
    ports:
      - "5432:5432"
    env_file: ./.env
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      # - ./postgres_data:/var/lib/postgresql/data  
      - postgres_data:/var/lib/postgresql/data # <-- Volume path changed: removed the "." 

      ### >>> why move from "./postgres_data:/var......." to "postgres_data:/var........." 
      # 1. Prevent accidental host-side permission issues
      # - Bind mounts (./postgres_data) depend on your local folder’s permissions.
      # - Postgres is very sensitive — if permissions are slightly wrong, Postgres can refuse to start. A named volume (postgres_data:) avoids this problem.

      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  # pgAdmin4
  # A web-based database management tool for PostgreSQL
  pgadmin:
    container_name: pgadmin4_dsi_container
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: '${PGADMIN_DEFAULT_EMAIL}'
      PGADMIN_DEFAULT_PASSWORD: '${PGADMIN_DEFAULT_PASSWORD}'
    ports:
      - "5051:80"
  # MinIO
  # An object storage server compatible with Amazon S3
  minio:
    restart: always
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9100:9000"   # HOST_PORT : CONTAINER_PORT <--ONLY CHANGE THE HOST_PORT
      # "9100:9000" means: 
      # - The MinIO server inside the container listens on port 9000
      # - You want to access it on your host machine at port 9100

      - "9101:9001"   # <-- port update origin 9001:9001
      # Container UI → 9001
      # Host exposes it as → 9101
    env_file: ./.env
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_ACCESS_KEY}
      - MINIO_STORAGE_USE_HTTPS=false
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data

  # MinIO Client
  # A command-line client for MinIO
  minio-setup:
    image: quay.io/minio/mc
    env_file: ./.env
    depends_on:
      - minio
    volumes:
      - ./minio/create-bucket.sh:/create-bucket.sh
    entrypoint: /bin/sh
    command: -c "chmod +x /create-bucket.sh && /create-bucket.sh"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_ACCESS_KEY}
  # MLflow
  # An open-source platform for managing the ML lifecycle
  # It includes experimentation, reproducibility, and deployment
  mlflow:
    restart: always
    build: ./mlflow
    image: mlflow_server
    container_name: mlflow_server
    ports:
      - "5001:5000"  
    env_file: ./.env
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_S3_IGNORE_TLS=true
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/mlflow
      --host 0.0.0.0
      --serve-artifacts
      --artifacts-destination s3://mlflow
    depends_on:
      - postgres
      - minio-setup
volumes:          # <--- new add
  postgres_data:  # <--- new add